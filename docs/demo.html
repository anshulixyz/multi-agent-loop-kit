<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Multi-Agent Loop Kit — Claude Code plugin demo</title>
<style>
  :root{
    --bg:#0b0e14; --panel:#0d1117; --border:#1f2630; --text:#c9d1d9; --dim:#8b949e;
    --green:#3fb950; --amber:#d29922; --blue:#58a6ff; --purple:#bc8cff; --red:#f85149;
    --mono:"SF Mono",ui-monospace,"JetBrains Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:radial-gradient(1200px 700px at 70% -10%,#16203a 0%,var(--bg) 55%);
    color:var(--text);font-family:var(--mono);display:flex;align-items:center;
    justify-content:center;min-height:100vh;padding:28px;
  }
  .wrap{width:min(880px,100%)}
  .lead{display:flex;align-items:baseline;gap:12px;margin:0 4px 14px;flex-wrap:wrap}
  .lead h1{font-size:18px;margin:0;font-weight:600;letter-spacing:.2px}
  .lead .tag{color:var(--dim);font-size:13px}
  .term{
    background:linear-gradient(180deg,#0e141d,var(--panel));border:1px solid var(--border);
    border-radius:12px;overflow:hidden;box-shadow:0 24px 60px -20px rgba(0,0,0,.7);
  }
  .bar{display:flex;align-items:center;gap:8px;padding:11px 14px;background:#0a0d13;border-bottom:1px solid var(--border)}
  .dot{width:12px;height:12px;border-radius:50%}
  .r{background:#ff5f56}.y{background:#ffbd2e}.g{background:#27c93f}
  .bar .who{margin-left:8px;color:var(--dim);font-size:12.5px}
  .scr{padding:18px 20px 22px;height:486px;overflow:hidden;font-size:14px;line-height:1.6}
  .line{white-space:pre-wrap;word-break:break-word;opacity:0;transform:translateY(4px);animation:rise .26s ease forwards}
  @keyframes rise{to{opacity:1;transform:none}}
  .cmt{color:var(--dim)}
  .prompt{color:var(--purple)}
  .ok{color:var(--green)} .warn{color:var(--amber)} .info{color:var(--blue)} .dim{color:var(--dim)}
  .caret{display:inline-block;width:8px;height:16px;background:var(--text);vertical-align:-3px;margin-left:2px;animation:blink 1s steps(1) infinite}
  @keyframes blink{50%{opacity:0}}
  .board{margin-top:6px;border:1px solid var(--border);border-radius:10px;overflow:hidden}
  .board .bhead{padding:8px 12px;background:#0a0e15;color:var(--dim);font-size:12.5px;border-bottom:1px solid var(--border)}
  .row{display:grid;grid-template-columns:118px 122px 1fr;gap:10px;padding:10px 12px;border-bottom:1px solid #161c25;
       opacity:0;transform:translateX(-6px);align-items:center;transition:background .4s ease}
  .row:last-child{border-bottom:0}
  .row.show{animation:slidein .32s ease forwards}
  @keyframes slidein{to{opacity:1;transform:none}}
  .row.flip{background:rgba(63,185,80,.14)}
  .agent{font-weight:600}
  .branch{color:var(--dim);font-size:12.5px}
  .pill{display:inline-block;padding:2px 9px;border-radius:999px;font-size:12px;font-weight:600;transition:.3s}
  .pill.active{color:#0b0e14;background:var(--green)}
  .pill.idle{color:var(--dim);background:#161c25;border:1px solid var(--border)}
  .pill.blocked{color:#0b0e14;background:var(--amber)}
  .detail{font-size:13px}
  .needs{color:var(--amber);font-weight:600}
  .glow{animation:glow 1.4s ease-in-out infinite}
  @keyframes glow{0%,100%{box-shadow:0 0 0 0 rgba(210,153,34,0)}50%{box-shadow:0 0 0 4px rgba(210,153,34,.3)}}
  .summary{margin-top:10px;color:var(--dim)}
  .kicker{margin:16px 4px 0;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
  .kicker .punch{font-size:15px}
  .kicker .punch b{color:#fff}
  .replay{font-family:var(--mono);font-size:13px;color:var(--text);background:#161c25;border:1px solid var(--border);
          padding:7px 14px;border-radius:8px;cursor:pointer;transition:.15s}
  .replay:hover{background:#1d2531;border-color:#2b3442}
</style>
</head>
<body>
  <div class="wrap">
    <div class="lead">
      <h1>🛰️ Multi-Agent Loop Kit</h1>
      <span class="tag">a Claude Code plugin — turn any repo into a supervised multi-agent loop</span>
    </div>
    <div class="term">
      <div class="bar">
        <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
        <span class="who">claude — loop plugin</span>
      </div>
      <div class="scr" id="scr"></div>
    </div>
    <div class="kicker">
      <div class="punch">Parallel agents. One operator. <b>Nothing merges without you.</b></div>
      <button class="replay" id="replay">↻ Replay</button>
    </div>
  </div>

<script>
const scr = document.getElementById('scr');
const sleep = ms => new Promise(r=>setTimeout(r,ms));

function add(html, cls){
  const d=document.createElement('div');
  d.className='line'+(cls?' '+cls:'');
  d.innerHTML=html; scr.appendChild(d); scr.scrollTop=scr.scrollHeight; return d;
}
async function type(cmd){
  const d=add('<span class="prompt">&gt; </span>');
  const span=document.createElement('span'); d.appendChild(span);
  const caret=document.createElement('span'); caret.className='caret'; d.appendChild(caret);
  for(const ch of cmd){ span.textContent+=ch; await sleep(30); }
  caret.remove(); await sleep(240);
}

const board = `
<div class="board" id="board">
  <div class="bhead">📋 Agent status board</div>
  <div class="row" id="row-frontend">
    <div><span style="color:var(--green)">●</span> <span class="agent">frontend</span></div>
    <div class="branch">frontend/day-1</div>
    <div class="detail"><span class="pill active">active</span> &nbsp;building the dashboard route → next: wire data fetch</div>
  </div>
  <div class="row" id="row-backend">
    <div><span id="dot-backend" style="color:var(--amber)">●</span> <span class="agent">backend</span></div>
    <div class="branch">backend/day-1</div>
    <div class="detail" id="detail-backend"><span class="pill blocked glow" id="pill-backend">blocked</span> &nbsp;<span class="needs">needs you</span> — approval to change the /orders API contract</div>
  </div>
  <div class="row" id="row-beacon">
    <div><span style="color:var(--dim)">●</span> <span class="agent">beacon</span></div>
    <div class="branch dim">—</div>
    <div class="detail"><span class="pill idle">idle</span> &nbsp;nothing in progress</div>
  </div>
</div>
<div class="summary" id="summary">──────────  3 agents · 2 idle · <span class="warn">1 blocked</span>  ──────────</div>`;

async function run(){
  window.__done=false; scr.innerHTML='';
  add('<span class="cmt"># 1 · Install — once. The repo is its own marketplace.</span>');
  await sleep(420);
  await type('/plugin marketplace add anshulixyz/multi-agent-loop-kit');
  add('<span class="ok">✔</span> added marketplace <span class="dim">multi-agent-loop-kit</span>'); await sleep(340);
  await type('/plugin install loop@multi-agent-loop-kit');
  add('<span class="ok">✔</span> installed <span class="info">loop@multi-agent-loop-kit</span> · <span class="ok">enabled</span>'); await sleep(480);

  add('&nbsp;'); add('<span class="cmt"># 2 · Stand up parallel agents — each in its own git worktree.</span>');
  await sleep(320);
  await type('/loop:spawn frontend');
  add('<span class="ok">✔</span> worktree <span class="dim">../app-frontend</span> · branch <span class="info">frontend/day-1</span>'); await sleep(280);
  await type('/loop:spawn backend');
  add('<span class="ok">✔</span> worktree <span class="dim">../app-backend</span> · branch <span class="info">backend/day-1</span>'); await sleep(480);

  add('&nbsp;'); add('<span class="cmt"># 3 · See everyone at a glance.</span>');
  await sleep(280);
  await type('/loop:status');
  const wrap=add(board); await sleep(120);
  for(const id of ['row-frontend','row-backend','row-beacon']){
    document.getElementById(id).classList.add('show'); await sleep(400);
  }
  await sleep(900); // let the amber "needs you" breathe

  // 4 · the payoff — approve, and backend unblocks itself
  add('&nbsp;'); add('<span class="cmt"># 4 · You decide. Approve — and the agent unblocks.</span>');
  await sleep(320);
  await type('/loop:approvals');
  add('<span class="warn">⏳ 001</span> · change /orders API contract · from <b>backend</b> · <span class="warn">PENDING</span>'); await sleep(520);
  await type('approve 001');
  add('<span class="ok">✔</span> approved · <span class="info">backend</span> unblocked'); await sleep(300);

  document.getElementById('board').scrollIntoView({block:'nearest'});
  const row=document.getElementById('row-backend');
  row.classList.add('flip');
  document.getElementById('dot-backend').style.color='var(--green)';
  document.getElementById('pill-backend').className='pill active';
  document.getElementById('pill-backend').textContent='active';
  document.getElementById('detail-backend').innerHTML='<span class="pill active">active</span> &nbsp;picking up /orders — adding the currency field';
  document.getElementById('summary').innerHTML='──────────  3 agents · <span class="dim">1 idle</span> · <span class="ok">0 blocked</span>  ──────────';
  await sleep(700); row.classList.remove('flip');
  window.__done=true;
}

document.getElementById('replay').addEventListener('click', run);
run();
</script>
</body>
</html>
