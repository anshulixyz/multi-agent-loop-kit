<!doctype html><html lang="en"><head><meta charset="utf-8"/>
<title>Operator — Claude Code CLI</title>
<style>
:root{--bg:#1a1714;--panel:#1f1b17;--border:#3a322a;--text:#e9e2d6;--dim:#9a8f7e;
--clay:#d97757;--green:#7fb37a;--amber:#e0a458;--blue:#7fa6d9;--purple:#b896d6;--teal:#5fc5b8;
--mono:"SF Mono",ui-monospace,Menlo,Consolas,monospace;}
*{box-sizing:border-box}html,body{margin:0;height:100%}
body{background:#0e0c0a;color:var(--text);font-family:var(--mono);min-height:100vh;
display:flex;align-items:center;justify-content:center;padding:24px}
.wrap{width:min(900px,100%)}
.cap{margin:0 6px 12px;color:var(--dim);font-size:13px}
.cap b{color:var(--text)}
.term{background:var(--panel);border:1px solid var(--border);border-radius:11px;overflow:hidden;
box-shadow:0 24px 60px -24px #000}
.bar{display:flex;align-items:center;gap:8px;padding:10px 13px;background:#171411;border-bottom:1px solid var(--border)}
.dot{width:11px;height:11px;border-radius:50%}.r{background:#ff5f56}.y{background:#ffbd2e}.g{background:#27c93f}
.bar .who{margin-left:8px;color:var(--dim);font-size:12px}
.scr{padding:16px 18px;height:520px;overflow:hidden;font-size:13.5px;line-height:1.62}
.ln{white-space:pre-wrap;word-break:break-word;opacity:0;animation:rise .2s ease forwards}
@keyframes rise{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}
.u{color:var(--text)}.u .p{color:var(--green);font-weight:700}
.act .b{color:var(--clay);font-weight:700}            /* ⏺ bullet */
.tool{color:var(--dim)}.tool .nm{color:var(--text)}
.res{color:var(--dim)}.res .v{color:var(--text)}
.ind{padding-left:20px}
.more{color:var(--dim);font-style:italic}
.say{color:var(--text)}
.green{color:var(--green)}.amber{color:var(--amber)}.blue{color:var(--blue)}.purple{color:var(--purple)}.teal{color:var(--teal)}.dim{color:var(--dim)}
.caret{display:inline-block;width:7px;height:15px;background:var(--text);vertical-align:-2px;margin-left:1px;animation:blink 1s steps(1) infinite}
@keyframes blink{50%{opacity:0}}
</style></head><body>
<div class="wrap">
  <div class="cap">What the <b>operator</b> actually sees — the loop is driven from inside <b>Claude Code</b>.</div>
  <div class="term">
    <div class="bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
      <span class="who">claude — ~/app (main)</span></div>
    <div class="scr" id="scr"></div>
  </div>
</div>
<script>
const scr=document.getElementById('scr');const sleep=ms=>new Promise(r=>setTimeout(r,ms));
function row(html,cls){const d=document.createElement('div');d.className='ln'+(cls?' '+cls:'');d.innerHTML=html;scr.appendChild(d);scr.scrollTop=scr.scrollHeight;return d;}
async function user(cmd){const d=row('<span class="p">❯</span> ','u');const s=document.createElement('span');d.appendChild(s);
  const c=document.createElement('span');c.className='caret';d.appendChild(c);
  for(const ch of cmd){s.textContent+=ch;await sleep(32);}c.remove();await sleep(240);}
const A='<span class="b">⏺</span> ';
async function run(){
  window.__done=false;
  await user('/loop:status');
  row(A+'<span class="tool"><span class="nm">Bash</span>(bash "~/.../bin/loop-status")</span>','act');await sleep(260);
  row('  <span class="res">⎿  📋 Agent status board</span>','');await sleep(120);
  row('     <span class="res">● <span class="v">frontend</span>  [frontend/feat-currency]  · <span class="green">active</span></span>','');await sleep(110);
  row('         <span class="res">now: building the currency selector in src/ui/OrderForm</span>','');await sleep(110);
  row('     <span class="res">● <span class="v">backend</span>   [backend/feat-currency]   · <span class="amber">blocked</span></span>','');await sleep(110);
  row('         <span class="res">blocked: approval to add `currency` to /orders (frozen contract)</span>','');await sleep(110);
  row('     <span class="res">● <span class="v">anvil</span>     [anvil/feat-currency]     · <span class="teal">shipped migration</span></span>','');await sleep(110);
  row('     <span class="more">… +6 lines (ctrl+o to expand)</span>','');await sleep(420);
  row(A+'<span class="say"><b>3 agents · 2 idle · 1 blocked.</b> <span class="amber">backend</span> is waiting on you — approval <b>001</b> (the /orders contract is frozen).</span>','act');
  await sleep(1100);
  row('&nbsp;','');
  await user('approve the /orders currency contract');
  row(A+'<span class="tool"><span class="nm">Read</span>(agents-status/approvals/001-orders-currency-contract.md)</span>','act');await sleep(300);
  row(A+'<span class="tool"><span class="nm">Update</span>(agents-status/approvals/001-orders-currency-contract.md)</span>','act');await sleep(220);
  row('  <span class="res">⎿  Status: <span class="amber">PENDING</span> → <span class="green">APPROVED</span></span>','');await sleep(400);
  row(A+'<span class="say">Approved. <span class="amber">backend</span> is unblocked — it can implement the <span class="blue">currency</span> field and open a PR. Nothing merged without you.</span>','act');
  await sleep(1700);window.__done=true;
}
window.addEventListener('load',()=>setTimeout(run,150));
</script></body></html>
